
<style>
#erd { padding: 0.5rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  Departments ||--o{ Doctors : "has"
  Departments ||--o{ Appointments : "linked to"
  Doctors ||--o{ Appointments : "conducts"
  Patients ||--o{ Appointments : "books"
  Patients ||--o{ MedicalRecords : "has"
  Patients ||--o{ Bills : "pays"
  Appointments ||--o{ Treatments : "leads to"
  Appointments ||--o{ Bills : "billed as"
  Treatments ||--o{ Prescriptions : "includes"

  Departments {
    int DepartmentID PK
    varchar DepartmentNM
    varchar Location
    varchar Phone
  }
  Doctors {
    int DoctorID PK
    int DepartmentID FK
    varchar DoctorNM
    varchar Specialization
    varchar Email
    date HireDate
  }
  Patients {
    int PatientID PK
    varchar FullName
    varchar Gender
    date BirthDate
    varchar BloodType
    varchar Address
  }
  Rooms {
    int RoomID PK
    varchar RoomNumber
    varchar RoomType
    int FloorNumber
    varchar Status
  }
  Appointments {
    int AppointmentID PK
    int PatientID FK
    int DoctorID FK
    int DepartmentID FK
    datetime AppointmentDate
    varchar Reason
    varchar Status
  }
  Treatments {
    int TreatmentID PK
    int AppointmentID FK
    varchar TreatmentNM
    decimal Cost
    date TreatmentDate
  }
  Prescriptions {
    int PrescriptionID PK
    int TreatmentID FK
    varchar MedicineName
    varchar Dosage
    varchar Duration
  }
  MedicalRecords {
    int RecordID PK
    int PatientID FK
    date RecordDate
    varchar Diagnosis
    varchar Notes
  }
  Bills {
    int BillID PK
    int PatientID FK
    int AppointmentID FK
    decimal TotalAmount
    varchar PaymentStatus
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
